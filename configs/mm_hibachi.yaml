exchange: hibachi

hibachi:
  poll_interval_ms: 3000
  inflight_timeout_ms: 5000
  max_fees_percent: 0.001

perp:
  binance: [BTC_USDT]
  hibachi: [BTC_USDT]


fair_price:
  basis_halflife_secs: 600.0
  basis_tick_ms: 100
  basis_cache_path: /tmp/mm_hibachi_basis_cache.json
  pairs:
    - target_exchange: hibachi
      target_symbol: PERP_BTC_USDT
      reference_exchange: binance
      reference_symbol: PERP_BTC_USDT
