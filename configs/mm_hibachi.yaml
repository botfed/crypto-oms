exchange: hibachi

hibachi:
  poll_interval_ms: 3000
  inflight_timeout_ms: 5000
  max_fees_percent: 0.001

perp:
  binance: [BTC_USDT, ETH_USDT, SOL_USDT]
  hibachi: [BTC_USDT, ETH_USDT, SOL_USDT]


fair_price:
  basis_halflife_secs: 600.0
  basis_tick_ms: 100
  basis_cache_path: /tmp/mm_hibachi_basis_cache.json
  pairs:
    - target_exchange: hibachi
      target_symbol: PERP_BTC_USDT
      reference_exchange: binance
      reference_symbol: PERP_BTC_USDT
    - target_exchange: hibachi
      target_symbol: PERP_ETH_USDT
      reference_exchange: binance
      reference_symbol: PERP_ETH_USDT
    - target_exchange: hibachi
      target_symbol: PERP_SOL_USDT
      reference_exchange: binance
      reference_symbol: PERP_SOL_USDT

inventory:
  mode: static
  static_target:
    target: 0.0
  hedge:
    exposure_file: "/dev/null"
    poll_ms: 1000
    mappings: {}

skew_scale_usd: 200.0
post_only: true

symbols:
  - symbol: PERP_BTC_USDT
    max_stale_ms: 2000
    order_notional_usd: 100.0
    max_position_usd: 5000.0
    ref_half_spread_bps: 3.0
    ref_min_spread_bps: 1.0
    max_skew_bps: 2.0
    min_edge_bps: -1.0
    ref_requote_tolerance_bps: 1.0
    ref_vol: 0.80
    vol_mult_floor: 0.3
    vol_mult_cap: 2.0
    vol_symbol: "BTC"
    quote_interval_ms: 150
    warmup_secs: 3
    max_feed_age_ms: 10000
    stray_order_age_ms: 6000
  - symbol: PERP_ETH_USDT
    max_stale_ms: 2000
    order_notional_usd: 100.0
    max_position_usd: 5000.0
    ref_half_spread_bps: 3.0
    ref_min_spread_bps: 1.0
    max_skew_bps: 2.0
    min_edge_bps: -1.0
    ref_requote_tolerance_bps: 1.0
    ref_vol: 0.35
    vol_mult_floor: 0.3
    vol_mult_cap: 2.0
    vol_symbol: "ETH"
    quote_interval_ms: 150
    warmup_secs: 3
    max_feed_age_ms: 10000
    stray_order_age_ms: 6000
  - symbol: PERP_SOL_USDT
    max_stale_ms: 2000
    order_notional_usd: 100.0
    max_position_usd: 5000.0
    ref_half_spread_bps: 4.0
    ref_min_spread_bps: 1.5
    max_skew_bps: 3.0
    min_edge_bps: -1.0
    ref_requote_tolerance_bps: 1.5
    ref_vol: 0.60
    vol_mult_floor: 0.3
    vol_mult_cap: 2.0
    vol_symbol: "SOL"
    quote_interval_ms: 150
    warmup_secs: 3
    max_feed_age_ms: 10000
    stray_order_age_ms: 6000
