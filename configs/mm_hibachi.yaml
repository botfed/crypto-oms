inventory:
  mode: static
  static_target:
    target: 0.0
  hedge:
    exposure_file: "/dev/null"
    poll_ms: 1000
    mappings: {}

skew_scale_usd: 200.0
post_only: true
ref_half_spread_bps: 3.0
ref_min_spread_bps: 0.5
min_edge_bps: 0.5
max_skew_bps: 2.0
ref_requote_tolerance_bps: 6.0
quote_interval_ms: 1000
warmup_secs: 3
max_feed_age_ms: 10000
stray_order_age_ms: 6000
stale_cancel_ms: 2000
order_notional_usd: 100.0
max_position_usd: 5000.0

symbols:
  - symbol: PERP_BTC_USDT
    ref_vol: 0.80
    vol_mult_floor: 0.3
    vol_mult_cap: 2.0
    vol_symbol: "BTC"
