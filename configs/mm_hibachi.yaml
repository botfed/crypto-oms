exchange: hibachi

hibachi:
  poll_interval_ms: 3000
  inflight_timeout_ms: 5000
  max_fees_percent: 0.001

perp:
  binance: [BTC_USDT, ETH_USDT, SOL_USDT, SUI_USDT, XRP_USDT, BNB_USDT]
  hibachi: [BTC_USDT, ETH_USDT, SOL_USDT, SUI_USDT, XRP_USDT, BNB_USDT]

vol_models:
  params_dir: "../botfed-params/vol"
  bar_data_dir: "../data/binance_ohlcv/perps/1m"
  model: "har_qlike"
  warmup_days: 2


fair_price:
  basis_halflife_secs: 600.0
  basis_tick_ms: 100
  basis_cache_path: /tmp/mm_hibachi_basis_cache.json
  pairs:
    - target_exchange: hibachi
      target_symbol: PERP_BTC_USDT
      reference_exchange: binance
      reference_symbol: PERP_BTC_USDT
    - target_exchange: hibachi
      target_symbol: PERP_ETH_USDT
      reference_exchange: binance
      reference_symbol: PERP_ETH_USDT
    - target_exchange: hibachi
      target_symbol: PERP_SOL_USDT
      reference_exchange: binance
      reference_symbol: PERP_SOL_USDT
    # - target_exchange: hibachi
    #   target_symbol: PERP_HYPE_USDT
    #   reference_exchange: binance
    #   reference_symbol: PERP_HYPE_USDT
    - target_exchange: hibachi
      target_symbol: PERP_BNB_USDT
      reference_exchange: binance
      reference_symbol: PERP_BNB_USDT
    - target_exchange: hibachi
      target_symbol: PERP_SUI_USDT
      reference_exchange: binance
      reference_symbol: PERP_SUI_USDT
    - target_exchange: hibachi
      target_symbol: PERP_XRP_USDT
      reference_exchange: binance
      reference_symbol: PERP_XRP_USDT

inventory:
  mode: static
  static_target:
    target: 0.0
  hedge:
    exposure_file: "/dev/null"
    poll_ms: 1000
    mappings: {}

skew_scale_usd: 100.0
post_only: true
ref_half_spread_bps: 10
ref_min_spread_bps: 5
ref_requote_tolerance_bps: 5
min_edge_bps: -0.5
max_skew_bps: 10.0
quote_interval_ms: 1000
warmup_secs: 3
max_feed_age_ms: 10000
stray_order_age_ms: 1000
stale_cancel_ms: 2000
order_notional_usd: 100.0
max_position_usd: 5000.0

symbols:
  - symbol: PERP_BTC_USDT
    ref_vol: 0.40
    vol_mult_floor: 1.0
    vol_mult_cap: 10.0
    vol_symbol: "BTC"
    taker:
      enabled: true
      threshold_bps: 5.0
      notional_usd: 100.0
      cooldown_ms: 1000
  - symbol: PERP_ETH_USDT
    ref_vol: 0.40
    vol_mult_floor: 1.0
    vol_mult_cap: 10.0
    vol_symbol: "ETH"
    taker:
      enabled: true
      threshold_bps: 6.0
      notional_usd: 100.0
      cooldown_ms: 1000
  # - symbol: PERP_SOL_USDT
  #   ref_vol: 0.40
  #   vol_mult_floor: 0.3
  #   vol_mult_cap: 2.0
  #   vol_symbol: "SOL"
  # - symbol: PERP_HYPE_USDT
  #   ref_vol: 1.00
  #   vol_mult_floor: 0.3
  #   vol_mult_cap: 2.0
  #   vol_symbol: "HYPE"
  - symbol: PERP_BNB_USDT
    ref_vol: 0.40
    vol_mult_floor: 1.0
    vol_mult_cap: 10.0
    vol_symbol: "BNB"
    taker:
      enabled: true
      threshold_bps: 6.0
      notional_usd: 100.0
      cooldown_ms: 1000
  - symbol: PERP_SUI_USDT
    ref_vol: 0.40
    vol_mult_floor: 1.0
    vol_mult_cap: 1.0
    vol_symbol: "SUI"
    ref_half_spread_bps: 100
    ref_min_spread_bps: 50
    ref_requote_tolerance_bps: 50
    taker:
      enabled: true
      threshold_bps: 7.0
      notional_usd: 100.0
      cooldown_ms: 1000
  # - symbol: PERP_XRP_USDT
  #   ref_vol: 0.40
  #   vol_mult_floor: 0.3
  #   vol_mult_cap: 2.0
  #   vol_symbol: "XRP"