hyperliquid:
  poll_interval_ms: 3000
  inflight_timeout_ms: 5000

perp:
  binance: [ETH_USDT, AIXBT_USDT]
  okx: [AIXBT_USDT]
  bybit: [AIXBT_USDT]
  hyperliquid: [AIXBT_USDC]

sample_interval_ms: 10

fair_price:
  basis_halflife_secs: 600.0
  basis_tick_ms: 100
  pairs:
    - target_exchange: hyperliquid
      target_symbol: PERP_AIXBT_USDC
      reference_exchange: binance
      reference_symbol: PERP_AIXBT_USDT
    - target_exchange: hyperliquid
      target_symbol: PERP_AIXBT_USDC
      reference_exchange: okx
      reference_symbol: PERP_AIXBT_USDT
    - target_exchange: hyperliquid
      target_symbol: PERP_AIXBT_USDC
      reference_exchange: bybit
      reference_symbol: PERP_AIXBT_USDT

inventory:
  mode: hedge
  static_target:
    target: 0.0
  hedge:
    exposure_file: "/tmp/aerobot/0x313b6755EFe1A31E16aa7D375AE918384ACD737e.json"
    poll_ms: 100
    mappings:
      BTC:
        - "0xWBTC_ADDRESS"
        - "0xcbBTC_ADDRESS"
      AIXBT:
        - "0x4F9Fd6Be4a90f2620860d680c0d4d5Fb53d1A825"

vol_models:
  params_dir: "../botfed-params/vol"
  bar_data_dir: "../data/binance_ohlcv/perps/1m"
  model: "har_qlike"
  warmup_days: 2

strategy:
  symbol: PERP_AIXBT_USDC
  max_stale_ms: 2000
  order_notional_usd: 100.0
  max_position_usd: 10000.0
  ref_half_spread_bps: 10
  ref_min_spread_bps: 5
  ref_requote_tolerance_bps: 10.0
  max_skew_bps: 10.0
  min_edge_bps: 2.5
  ref_vol: 1.40
  vol_mult_floor: 0.3
  vol_mult_cap: 5.0
  vol_symbol: "AIXBT"
  quote_interval_ms: 150
  post_only: false
  warmup_secs: 10
  max_feed_age_ms: 10000
  stray_order_age_ms: 6000
  factor_model:
    enabled: false
    factors:
      - symbol: PERP_ETH_USDT
        exchanges: [binance]
        beta: 0.97
